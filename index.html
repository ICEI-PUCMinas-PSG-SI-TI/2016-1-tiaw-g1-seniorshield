<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>SeniorShield</title>

  <!-- CSS -->

  <link
    rel="stylesheet"
    href="style.css"
  >

  <!-- Bootstrap Icons -->

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >

  <!-- jsPDF -->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

  <!-- HEADER -->

  <header>
    <div class="header-conteudo">
        <img src="Senior Shield V3.png" alt="Logo SeniorShield" class="logo-img">
        
        <h1>SeniorShield</h1>

        <div class="espacador"></div>
    </div>
  </header>

  <!-- CONTAINER -->

  <main class="container">

    <!-- FORMULÁRIO -->

    <section class="formulario">

      <h2>

        <i class="bi bi-file-earmark-text"></i>
        Gerador de Boletim

      </h2>

      <p class="explicacao">

        Nessa parte, você pode gerar automaticamente
        um modelo de boletim de ocorrência e utilizá-lo
        diretamente em uma delegacia virtual.

      </p>

      <!-- NOME -->

      <input
        type="text"
        id="nome"
        placeholder="Nome completo"
      >

      <!-- DATA -->

      <input
        type="date"
        id="data"
      >

      <!-- TIPO DE GOLPE -->

      <select id="tipoGolpe">

        <option value="">
          Selecione o tipo de golpe
        </option>

        <option>
          Golpe do Pix
        </option>

        <option>
          WhatsApp clonado
        </option>

        <option>
          Cartão clonado
        </option>

        <option>
          Falso empréstimo
        </option>

        <option>
          Falso suporte técnico
        </option>

      </select>

      <!-- VALOR -->

      <input
        type="text"
        id="valor"
        placeholder="R$ 0,00"
      >

      <!-- DESCRIÇÃO -->

      <textarea
        id="descricao"
        rows="7"
        placeholder="Descreva como ocorreu o golpe"></textarea>

      <!-- BOTÃO GERAR -->

      <button
        type="button"
        id="btnGerar"
      >

        <i class="bi bi-pencil-square"></i>
        Gerar Boletim

      </button>

    </section>

    <!-- RESULTADO -->

    <section class="resultado">

      <h2>

        <i class="bi bi-journal-text"></i>
        Texto Gerado

      </h2>

      <!-- TEXTO -->

      <div id="textoBoletim"></div>

      <!-- BOTÕES -->

      <div class="botoes">
        <button type="button" id="btnCopiar">
          <i class="bi bi-copy"></i> Copiar
        </button>

        <button type="button" id="btnPDF">
          <i class="bi bi-file-earmark-pdf"></i> PDF
        </button>
      </div>

      <a 
        href="https://delegaciavirtual.sinesp.gov.br/portal/" 
        target="_blank" 
        class="btnDelegacia"
      >
        <i class="bi bi-box-arrow-up-right"></i> Ir para a Delegacia Virtual
      </a>

     </section>

        <!-- COPIAR -->

        

      </div>

    </section>

  </main>

  <!-- JAVASCRIPT -->

  <script src="script.js"></script>

</body>
</html>
