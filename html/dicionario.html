<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="artur" content="width=device-width, initial-scale=1.0">
    <title>Dicionario</title>
    <link rel="stylesheet" href="dicionario.css">
    <link href="https://fonts.googleapis.com/css2?family=Corinthia&display=swap" rel="stylesheet">
</head>

<body>
    <h1>Dicionário de Termos</h1>
    <p>Phishing: <span id="phishing"></span></p>
    <img src="imgs/phishing.png" alt="Imagem de Phishing" class="imagem">
    <p>Engenharia Social: <span id="engenharia-social"></span></p>
    <img src="imgs/engenharia.png" alt="Imagem de Phishing" class="imagem">
    <p>Vishing: <span id="vishing"></span></p>
    <img src="imgs/vishing.png" alt="Imagem de Phishing" class="imagem">
    <p>Malware: <span id="malware"></span></p>
    <img src="imgs/malware.png" alt="Imagem de Phishing" class="imagem">
    <p>Ransomware: <span id="ransomware"></span></p>
    <img src="imgs/ransomware.png" alt="Imagem de Phishing" class="imagem">
    <p>Spoofing: <span id="spoofing"></span></p>
    <img src="imgs/spoofing.png" alt="Imagem de Phishing" class="imagem">
    <p>Autenticação em Dois Fatores (2FA): <span id="2fa"></span></p>
     <img src="imgs/mfa.png" alt="Imagem de Phishing" class="imagem">
    <p>Link Malicioso: <span id="link-malicioso"></span></p>
    <img src="imgs/link.png" alt="Imagem de Phishing" class="imagem">
    <p>OTP (One-Time Password): <span id="otp"></span></p>
    <img src="imgs/otp.png" alt="Imagem de Phishing" class="imagem">
    <script src="script.js"></script>
</body>
